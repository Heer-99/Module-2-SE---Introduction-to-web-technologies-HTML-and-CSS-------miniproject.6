<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Tag Bio Link</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #1b1b1b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 350px;
            background: #2b2b2b;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        .container img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .container h2 {
            color: white;
            margin-bottom: 20px;
        }

        a {
            display: block;
            text-decoration: none;
            color: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            font-weight: bold;
        }

        .twitch {
            background: #9146FF;
        }

        .discord {
            background: #5865F2;
        }

        .steam {
            background: #171A21;
        }

        a:hover {
            opacity: 0.9;
        }

        /* Responsive */

        @media only screen and (max-width:600px) {

            .container {
                width: 100%;
                padding: 20px;
            }

            .container img {
                width: 100px;
                height: 100px;
            }

            .container h2 {
                font-size: 22px;
            }

            a {
                padding: 10px;
                font-size: 15px;
            }

        }
    </style>

</head>

<body>

    <div class="container">

        <img src="https://i.pravatar.cc/150?img=12" alt="Avatar">

        <h2>ShadowX</h2>

        <a href="https://www.twitch.tv/" class="twitch" target="_blank">
            🎮 Twitch
        </a>

        <a href="https://discord.com/" class="discord" target="_blank">
            💬 Discord
        </a>

        <a href="https://store.steampowered.com/" class="steam" target="_blank">
            🚂 Steam
        </a>

    </div>

</body>

</html>
