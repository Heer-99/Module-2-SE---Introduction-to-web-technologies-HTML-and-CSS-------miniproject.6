<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Bio Link Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f2f2f2;
            padding: 30px;
        }

        .container {
            max-width: 700px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: gray;
            margin-bottom: 25px;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .15);
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #1DB954;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #169c46;
        }

        #preview {
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 0 8px rgba(0, 0, 0, .15);
        }

        .card h3 {
            margin-bottom: 8px;
        }

        .card a {
            color: #2874F0;
            text-decoration: none;
            word-break: break-all;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>🎵 Social Bio Link Page</h1>
        <p>Add your music profile links below.</p>

        <form id="musicLinksForm">

            <label>Spotify Profile URL</label>
            <input type="url" id="spotify" placeholder="https://open.spotify.com/" required>

            <label>YouTube Music URL</label>
            <input type="url" id="youtube" placeholder="https://music.youtube.com/" required>

            <label>Apple Music URL</label>
            <input type="url" id="apple" placeholder="https://music.apple.com/" required>

            <button type="submit">Show Links</button>

        </form>

        <div id="preview"></div>

    </div>

    <script>

        document.getElementById("musicLinksForm").addEventListener("submit", function (e) {

            e.preventDefault();

            let spotify = document.getElementById("spotify").value;
            let youtube = document.getElementById("youtube").value;
            let apple = document.getElementById("apple").value;

            document.getElementById("preview").innerHTML = `

<div class="card">
<h3>🎵 Spotify</h3>
<a href="${spotify}" target="_blank">${spotify}</a>
</div>

<div class="card">
<h3>▶ YouTube Music</h3>
<a href="${youtube}" target="_blank">${youtube}</a>
</div>

<div class="card">
<h3>🍎 Apple Music</h3>
<a href="${apple}" target="_blank">${apple}</a>
</div>

`;

        });

    </script>

</body>

</html>
